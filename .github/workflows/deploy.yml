name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/motorcycle-store

            echo "📥 Pulling code..."
            git pull origin main

            echo "🔒 SELinux contexts..."
            restorecon -Rv . 2>/dev/null || true

            echo "📦 Composer dependencies..."
            docker compose run --rm laravel.test composer install --optimize-autoloader --no-dev --quiet

            echo "🗄 Database migrations..."
            docker compose run --rm laravel.test php artisan migrate --force --quiet

            echo "🎨 Frontend build..."
            docker compose run --rm laravel.test npm ci --quiet
            docker compose run --rm laravel.test npm run build --quiet

            echo "🚀 Restarting services..."
            docker compose up -d --remove-orphans

            echo "🧹 Clearing cache..."
            docker compose exec -T laravel.test php artisan optimize:clear

            echo "✅ Deploy complete!"
